  <!-- THEME SWITCHER DROPDOWN -->
  <!-- ============================================= -->
  <div class="theme-switcher-wrapper">
    <button class="theme-dropdown-btn" id="themeDropdownToggle">
      <i class="bi bi-palette-fill"></i>
      <span id="currentThemeLabel">Dark</span>
      <i class="bi bi-chevron-down"></i>
    </button>
    <ul class="theme-dropdown-menu" id="themeDropdownMenu">
      <li><button class="theme-option" data-theme="light"><i class="bi bi-sun-fill"></i> Light</button></li>
      <li><button class="theme-option active-theme" data-theme="dark"><i class="bi bi-moon-fill"></i> Dark</button></li>
      <li><button class="theme-option" data-theme="system"><i class="bi bi-display"></i> System</button></li>
      <li><button class="theme-option" data-theme="custom"><i class="bi bi-gear-fill"></i> Custom</button></li>
    </ul>
    <!-- Panel Custom Theme (Hidden by default) -->
    <div class="custom-theme-panel" id="customThemePanel" style="display: none;">
      <label>Background Color</label>
      <input type="color" id="customBgColor" value="#081018">
      <label>Text Color</label>
      <input type="color" id="customTextColor" value="#eff3f5">
      <label>Accent Color</label>
      <input type="color" id="customAccentColor" value="#8fe7c5">
      <button id="applyCustomTheme">Terapkan Custom</button>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- MUSIC PLAYER - NADHIF BASALAMAH PLAYLIST -->
  <!-- ============================================= -->
  <div class="music-player">
    <div class="music-toggle paused" id="musicToggle">
      <i class="bi bi-play-circle-fill"></i>
    </div>
  </div>

  <div id="musicOverlay" class="music-overlay" style="display:none;">
    <div class="music-overlay-card">
      <button class="music-overlay-close" id="musicOverlayClose" aria-label="Close">
        <i class="bi bi-x-lg"></i>
      </button>
      <div class="music-overlay-cover">
        <img id="musicOverlayCover" src="assets/img/favicon.png" alt="Cover" />
      </div>
      <div class="music-overlay-info">
        <div class="music-overlay-title" id="musicOverlayTitle">Judul Lagu</div>
        <div class="music-overlay-controls">
          <button id="musicPrev" class="music-overlay-btn">
            <i class="bi bi-skip-start-fill"></i>
          </button>
          <button id="musicOverlayPlay" class="music-overlay-btn">
            <i class="bi bi-play-fill"></i>
          </button>
          <button id="musicNext" class="music-overlay-btn">
            <i class="bi bi-skip-end-fill"></i>
          </button>
        </div>
        <div class="music-overlay-progress">
          <span id="musicCurrentTime">0:00</span>
          <input type="range" id="musicProgress" min="0" max="100" value="0">
          <span id="musicDuration">0:00</span>
        </div>
        <div class="music-overlay-volume">
          <i class="bi bi-volume-down-fill"></i>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3">
          <i class="bi bi-volume-up-fill"></i>
        </div>
      </div>
    </div>
  </div>
